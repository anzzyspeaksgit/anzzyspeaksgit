name: Update README with Latest PRs

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:  # Manual trigger

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Update Merged PRs Section
        run: |
          # Fetch merged PRs from GitHub API
          curl -s "https://api.github.com/search/issues?q=author:anzzyspeaksgit+type:pr+is:merged&sort=updated&order=desc&per_page=5" > /tmp/prs.json
          
          # Use Python to update the README
          python3 << 'EOF'
          import json
          import re

          # Read PRs data
          with open('/tmp/prs.json', 'r') as f:
              data = json.load(f)

          # Build table rows
          rows = []
          for item in data.get('items', []):
              repo_url = item['repository_url'].replace('api.github.com/repos', 'github.com')
              repo_name = item['repository_url'].split('/')[-1]
              pr_num = item['number']
              pr_url = item['html_url']
              title = item['title'][:45]
              rows.append(f"| [{repo_name}]({repo_url}) | [#{pr_num}]({pr_url}) {title} | ✅ Merged |")

          # Create new section
          new_section = """<!-- MERGED-PRS:START -->
          <!-- This section is auto-updated by GitHub Actions -->
          | Repository | PR | Status |
          |------------|-------|--------|
          """ + "\n".join(rows) + """
          <!-- MERGED-PRS:END -->"""

          # Remove extra indentation
          new_section = "\n".join(line.strip() for line in new_section.split("\n"))

          # Read README
          with open('README.md', 'r') as f:
              readme = f.read()

          # Replace section
          pattern = r'<!-- MERGED-PRS:START -->.*?<!-- MERGED-PRS:END -->'
          new_readme = re.sub(pattern, new_section, readme, flags=re.DOTALL)

          # Write README
          with open('README.md', 'w') as f:
              f.write(new_readme)

          print("README updated successfully!")
          EOF

      - name: Commit and Push
        run: |
          git config --local user.name "Anzzy"
          git config --local user.email "anzzyspeaksgit@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 Auto-update: Latest merged PRs"
            git push
          fi
