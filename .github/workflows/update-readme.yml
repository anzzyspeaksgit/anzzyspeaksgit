name: Update README with Latest PRs

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:  # Manual trigger

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Update Merged PRs Section
        run: |
          # Fetch merged PRs from GitHub API
          curl -s "https://api.github.com/search/issues?q=author:anzzyspeaksgit+type:pr+is:merged&sort=updated&order=desc&per_page=5" > /tmp/prs.json
          
          # Use Python to update the README
          python3 << 'EOF'
          import json
          import re

          # Read PRs data
          with open('/tmp/prs.json', 'r') as f:
              data = json.load(f)

          # Build table rows in HTML format
          rows = []
          for item in data.get('items', []):
              repo_name = item['repository_url'].split('/')[-1]
              pr_num = item['number']
              pr_url = item['html_url']
              title = item['title'][:50]
              rows.append(f'''    <tr>
      <td><a href="{pr_url}"><code>#{pr_num}</code></a></td>
      <td><b>{repo_name}</b></td>
      <td>{title}</td>
      <td>✅ MERGED</td>
    </tr>''')

          # Create new section with HTML table
          table_rows = "\n".join(rows)
          new_section = f'''<!-- MERGED-PRS:START -->
<!-- This section is auto-updated by GitHub Actions -->
<div align="center">
  <table>
    <tr>
      <th>🔗 Verify It</th>
      <th>Repository</th>
      <th>What Changed</th>
      <th>Status</th>
    </tr>
{table_rows}
  </table>
</div>
<!-- MERGED-PRS:END -->'''

          # Read README
          with open('README.md', 'r') as f:
              readme = f.read()

          # Replace section
          pattern = r'<!-- MERGED-PRS:START -->.*?<!-- MERGED-PRS:END -->'
          new_readme = re.sub(pattern, new_section, readme, flags=re.DOTALL)

          # Write README
          with open('README.md', 'w') as f:
              f.write(new_readme)

          print("README updated successfully!")
          EOF

      - name: Commit and Push
        run: |
          git config --local user.name "Anzzy"
          git config --local user.email "anzzyspeaksgit@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 Auto-update: Latest merged PRs"
            git push
          fi
