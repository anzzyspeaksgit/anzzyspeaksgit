name: Update README with Latest PRs

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:  # Manual trigger

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch and Update Merged PRs
        run: |
          # Fetch merged PRs from GitHub API
          curl -s "https://api.github.com/search/issues?q=author:anzzyspeaksgit+type:pr+is:merged&sort=updated&order=desc&per_page=5" > /tmp/prs.json
          
          # Build the table rows
          TABLE_ROWS=$(jq -r '.items[] | "| [\(.repository_url | split("/") | .[-1])](\(.repository_url | gsub("api.github.com/repos"; "github.com"))) | [#\(.number)](\(.html_url)) \(.title | .[0:45]) | ✅ Merged |"' /tmp/prs.json)
          
          # Create the new section content
          cat > /tmp/new_section.txt << 'SECTION_END'
          <!-- MERGED-PRS:START -->
          <!-- This section is auto-updated by GitHub Actions -->
          | Repository | PR | Status |
          |------------|-------|--------|
          SECTION_END
          
          echo "$TABLE_ROWS" >> /tmp/new_section.txt
          echo "<!-- MERGED-PRS:END -->" >> /tmp/new_section.txt
          
          # Remove leading spaces from the section file
          sed -i 's/^          //' /tmp/new_section.txt
          
          # Replace the section in README using awk
          awk '
            /<!-- MERGED-PRS:START -->/ { 
              while ((getline line < "/tmp/new_section.txt") > 0) print line
              skip = 1
              next
            }
            /<!-- MERGED-PRS:END -->/ { skip = 0; next }
            !skip { print }
          ' README.md > /tmp/README_new.md
          
          mv /tmp/README_new.md README.md

      - name: Commit and Push
        run: |
          git config --local user.name "Anzzy"
          git config --local user.email "anzzyspeaksgit@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 Auto-update: Latest merged PRs"
            git push
          fi
